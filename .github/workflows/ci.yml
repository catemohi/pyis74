name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Проверки
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff format
        run: uv run ruff format --check

      - name: Ruff lint
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest

      - name: Privacy scan
        run: uv run python scripts/privacy_scan.py

      - name: Build
        run: uv build

      - name: Check distribution
        run: uv run twine check dist/*
